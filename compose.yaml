version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: ondo-mysql
    environment:
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - '3306:3306'
    volumes:
      - mysql:data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: ondo-redis
    ports:
      - '6379:6379'
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ondo-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
      - '61613:61613'
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: 123456
    command: >
      bash -lc "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
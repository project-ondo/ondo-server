name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ondo-app
  DEPLOY_PATH: /home/ubuntu/deploy/ondo-app

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, ARM64]

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux, ARM64]

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ondo-app
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DEPLOY_PATH: /home/ubuntu/deploy/ondo-app

    steps:
      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Deploy with Docker Compose
        run: |
          cd "${DEPLOY_PATH}"
          export IMAGE_NAME="${IMAGE_NAME}"
          export IMAGE_TAG="${IMAGE_TAG}"
          docker-compose pull
          docker-compose up -d

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8080/actuator/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Attempt $i/30, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1

  notify-success:
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Send CD success to Discord
        run: |
          GIFS=(
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOTB0am5rZzMxZ20zNjNlaGM4YjQ2czc1cThib256ODdnYzNkdnc0cyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/In0Lpu4FVivjISX9HT/giphy.gif"
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOTB0am5rZzMxZ20zNjNlaGM4YjQ2czc1cThib256ODdnYzNkdnc0cyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/1OrIIOIcRTDaNidc5p/giphy.gif"
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cGh5cDFoZHcyNGtnaWM5a2I2ajFrbHhxcGVtNzNhd2ppOHR3N2Q0YyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/YLPOIP1jPu1N87yemm/giphy.gif"
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOTB0am5rZzMxZ20zNjNlaGM4YjQ2czc1cThib256ODdnYzNkdnc0cyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/BK1EfIsdkKZMY/giphy.gif"
          )
          GIF_URL=${GIFS[$RANDOM % ${#GIFS[@]}]}
          curl -H "Content-Type: application/json" -X POST -d @- ${{ secrets.DISCORD_WEBHOOK_URL }} <<JSON
          {
            "embeds": [{
              "title": "🚀 CD 성공",
              "description": "main 브랜치 최신 커밋이 운영 서버에 성공적으로 배포되었습니다.",
              "color": 3066993,
              "fields": [
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "Commit",
                  "value": "${{ github.sha }}",
                  "inline": false
                },
                {
                  "name": "Image",
                  "value": "${{ secrets.DOCKERHUB_USERNAME }}/ondo-app:${{ needs.build-and-push.outputs.image_tag }}",
                  "inline": false
                }
              ],
              "image": {
                "url": "${GIF_URL}"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          JSON

  notify-failure:
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send CD failure to Discord
        run: |
          GIFS=(
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOTB0am5rZzMxZ20zNjNlaGM4YjQ2czc1cThib256ODdnYzNkdnc0cyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/2zUn8hAwJwG4abiS0p/giphy.gif"
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3dWxidzhleGpuZDB0bWVjaThucmRwc2dobnZwZWNiZWZtaTh5bm5paiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/sMK7zYV1hGGAajEznq/giphy.gif"
            "https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3cjc5aXh3ZGJ1djNsdWhiZmNpem50c2J5dWl6bmZuN21oMWwxeHYxYSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/XyuqO8Zi0yCqWXhhJd/giphy.gif"
          )
          GIF_URL=${GIFS[$RANDOM % ${#GIFS[@]}]}
          curl -H "Content-Type: application/json" -X POST -d @- ${{ secrets.DISCORD_WEBHOOK_URL }} <<JSON
          {
            "embeds": [{
              "title": "❌ CD 실패",
              "description": "main 브랜치 배포 중 오류가 발생했습니다.",
              "color": 15158332,
              "fields": [
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "Commit",
                  "value": "${{ github.sha }}",
                  "inline": false
                },
                {
                  "name": "Image",
                  "value": "${{ secrets.DOCKERHUB_USERNAME }}/ondo-app:${{ needs.build-and-push.outputs.image_tag }}",
                  "inline": false
                }
              ],
              "image": {
                "url": "${GIF_URL}"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          JSON
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  datasource:
    url: jdbc:mysql://localhost:3306/ondo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: user
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  security:
    cors:
      allowed-origins:
        - "http://localhost:3000"
        - "http://localhost:3001"

    jwt:
      access-token:
        secret: ${JWT_ACCESS_TOKEN_SECRET}
        expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
      refresh-token:
        secret: ${JWT_REFRESH_TOKEN_SECRET}
        expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: 123456

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

messaging:
  relay:
    host: localhost
    port: 61613
    username: user
    password: 123456

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
    presign:
      put-expiration-seconds: 120
      get-expiration-seconds: 600

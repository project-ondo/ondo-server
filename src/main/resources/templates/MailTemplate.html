<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONDO 이메일 인증</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8; margin:0; padding:40px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; background-color:#ffffff; border-radius:12px; overflow:hidden;">

                <tr>
                    <td align="center" style="background-color:#4A90E2; padding:24px 20px;">
                        <div style="font-size:28px; font-weight:700; color:#ffffff; letter-spacing:1px;">
                            ONDO
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:40px 32px; color:#333333;">
                        <p style="margin:0 0 16px; font-size:16px; line-height:1.7;">
                            안녕하세요,<br />
                            <strong>ONDO</strong>를 이용해주셔서 감사합니다.
                        </p>

                        <p style="margin:0 0 24px; font-size:16px; line-height:1.7;">
                            아래 <strong>이메일 인증 코드</strong>를 입력해 회원가입을 완료해주세요.
                        </p>

                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:24px 0 28px;">
                            <tr>
                                <td align="center">
                                    <div style="
                      display:inline-block;
                      padding:18px 32px;
                      background-color:#f8fbff;
                      border:1px solid #d6e7ff;
                      border-radius:10px;
                      font-size:32px;
                      font-weight:700;
                      letter-spacing:8px;
                      color:#4A90E2;
                    ">
                                        <span th:text="${code}"></span>
                                    </div>
                                </td>
                            </tr>
                        </table>

                        <p style="margin:0 0 12px; font-size:15px; line-height:1.7; color:#555555;">
                            인증 코드는 <strong>5분 동안 유효</strong>합니다.
                        </p>

                        <p style="margin:0 0 28px; font-size:15px; line-height:1.7; color:#555555;">
                            본인이 요청하지 않았다면 이 메일을 무시해주세요.
                        </p>

                        <div style="margin-top:32px; padding-top:20px; border-top:1px solid #eeeeee; font-size:13px; line-height:1.6; color:#888888;">
                            본 메일은 발신 전용입니다.<br />
                            © 2026 ONDO. All rights reserved.
                        </div>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
